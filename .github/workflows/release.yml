name: release


on:
  push:
    tags: ["v*"]

permissions:
  contents: write 

jobs:
  create-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if it doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "Copilot ${GITHUB_REF_NAME}" \
            --notes "Optimized builds of Copilot ${GITHUB_REF_NAME}. Most users install from source via the install script; these binaries are provided for convenience."

  upload-binaries:
    name: build & upload (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: macos-13           
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-latest      
            target: aarch64-apple-darwin
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry, index, and target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p cli --target ${{ matrix.target }}

      - name: Package binary
        run: cp "target/${{ matrix.target }}/release/copilot" "copilot-${GITHUB_REF_NAME}-${{ matrix.name }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "copilot-${GITHUB_REF_NAME}-${{ matrix.name }}" --clobber